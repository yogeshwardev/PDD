name: 🔐 Security Review – SAST + Dependency Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Technology Detection
  # ─────────────────────────────────────────────
  detect-tech:
    name: 🔍 Detect Technology Stack
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_java: ${{ steps.detect.outputs.has_java }}
      framework: ${{ steps.detect.outputs.framework }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Detect stack
        id: detect
        run: |
          HAS_NODE="false"
          HAS_PYTHON="false"
          HAS_JAVA="false"
          FRAMEWORK="unknown"

          [ -f "package.json" ] && HAS_NODE="true"
          [ -f "requirements.txt" ] || [ -f "setup.py" ] && HAS_PYTHON="true"
          [ -f "pom.xml" ] || [ -f "build.gradle" ] && HAS_JAVA="true"

          if [ -f "package.json" ]; then
            if grep -q "expo" package.json 2>/dev/null; then
              FRAMEWORK="expo-react-native"
            elif grep -q "next" package.json 2>/dev/null; then
              FRAMEWORK="nextjs"
            elif grep -q "react" package.json 2>/dev/null; then
              FRAMEWORK="react"
            fi
          fi

          echo "has_node=$HAS_NODE" >> $GITHUB_OUTPUT
          echo "has_python=$HAS_PYTHON" >> $GITHUB_OUTPUT
          echo "has_java=$HAS_JAVA" >> $GITHUB_OUTPUT
          echo "framework=$FRAMEWORK" >> $GITHUB_OUTPUT

          echo "=== Stack Detected ==="
          echo "Node.js:   $HAS_NODE"
          echo "Python:    $HAS_PYTHON"
          echo "Java:      $HAS_JAVA"
          echo "Framework: $FRAMEWORK"

  # ─────────────────────────────────────────────
  # JOB 2: SAST Scan (Semgrep)
  # ─────────────────────────────────────────────
  sast-semgrep:
    name: 🔍 SAST – Semgrep
    needs: detect-tech
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Semgrep
        run: pip install semgrep

      - name: 📁 Create output directories
        run: |
          mkdir -p "Vulnerability Test Results"
          mkdir -p security/reports

      - name: 🔍 Run Semgrep SAST
        run: |
          semgrep scan \
            --config=auto \
            --config=p/javascript \
            --config=p/react \
            --config=p/nodejs \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --json \
            --output=security/reports/semgrep-results.json \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=.expo \
            . 2>&1 || true

          echo "✅ Semgrep scan complete"
          if [ -f "security/reports/semgrep-results.json" ]; then
            FINDINGS=$(python3 -c "
          import json
          try:
              d = json.load(open('security/reports/semgrep-results.json'))
              results = d.get('results', [])
              print(f'Findings: {len(results)}')
              for r in results[:5]:
                  print(f\"  - {r.get('check_id','?')} in {r.get('path','?')}:{r.get('start',{}).get('line','?')}\")
          except: print('Could not parse results')
          " 2>/dev/null || echo "Results available")
            echo "$FINDINGS"
          fi
        continue-on-error: true

      - name: 📤 Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: security/reports/semgrep-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # JOB 3: Secret Detection (Gitleaks)
  # ─────────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Detection – Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: 🔍 Gitleaks file scan
        run: |
          mkdir -p security/reports

          # Install gitleaks
          GITLEAKS_VERSION="8.18.0"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz 2>/dev/null || true
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/ 2>/dev/null || true

          if [ -f "/tmp/gitleaks" ]; then
            chmod +x /tmp/gitleaks
            /tmp/gitleaks detect \
              --source . \
              --report-format json \
              --report-path security/reports/gitleaks-results.json \
              --no-git \
              --redact \
              2>&1 || true
            echo "✅ Gitleaks scan complete"
          else
            echo "⚠️ Gitleaks binary not found, running manual check"
            # Manual check for common secrets
            echo "Checking for hardcoded secrets..."
            grep -r "password\s*=\s*['\"]" --include="*.js" --include="*.ts" . \
              --exclude-dir=node_modules --exclude-dir=dist 2>/dev/null | head -20 || true
            
            # Check proxy-server.js specifically (has a hardcoded API key)
            if grep -q "Bearer " proxy-server.js 2>/dev/null; then
              echo "⚠️ WARNING: Hardcoded Bearer token found in proxy-server.js"
              echo '{"findings":[{"Description":"Hardcoded API key in proxy-server.js","File":"proxy-server.js","Line":20,"RuleID":"generic-api-key","Secret":"REDACTED"}]}' \
                > security/reports/gitleaks-results.json
            else
              echo '{"findings":[]}' > security/reports/gitleaks-results.json
            fi
          fi
        continue-on-error: true

      - name: 📤 Upload Gitleaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: security/reports/gitleaks-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # JOB 4: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Vulnerability Scan
    needs: detect-tech
    runs-on: ubuntu-latest
    if: needs.detect-tech.outputs.has_node == 'true'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📁 Create directories
        run: mkdir -p security/reports

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts 2>&1 || npm install --legacy-peer-deps --ignore-scripts 2>&1

      - name: 🔍 Run npm audit
        run: |
          npm audit --json > security/reports/npm-audit.json 2>&1 || true
          npm audit 2>&1 | head -100 || true

          echo "=== npm audit summary ==="
          python3 -c "
          import json
          try:
              d = json.load(open('security/reports/npm-audit.json'))
              meta = d.get('metadata', {})
              vulns = meta.get('vulnerabilities', {})
              print(f\"Critical: {vulns.get('critical', 0)}\")
              print(f\"High:     {vulns.get('high', 0)}\")
              print(f\"Moderate: {vulns.get('moderate', 0)}\")
              print(f\"Low:      {vulns.get('low', 0)}\")
          except Exception as e:
              print(f'Could not parse: {e}')
          " 2>/dev/null || echo "Audit results available in JSON"
        continue-on-error: true

      - name: 🔍 Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'security/reports/trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'node_modules,dist,build,.expo'
        continue-on-error: true

      - name: 📤 Upload dependency scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: security/reports/
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # JOB 5: Generate Security Reports
  # ─────────────────────────────────────────────
  generate-reports:
    name: 📊 Generate Security Reports
    needs: [sast-semgrep, secret-scan, dependency-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python dependencies
        run: |
          pip install openpyxl jinja2 markdown

      - name: 📥 Download all scan results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          path: security/reports
          merge-multiple: true
        continue-on-error: true

      - name: 📁 Create report directories
        run: mkdir -p "Vulnerability Test Results"

      - name: 📝 Generate security review markdown
        run: |
          python3 security/generate_security_report.py \
            --semgrep=security/reports/semgrep-results.json \
            --gitleaks=security/reports/gitleaks-results.json \
            --npm-audit=security/reports/npm-audit.json \
            --trivy=security/reports/trivy-results.json \
            --output="Vulnerability Test Results/security-review.md" \
            --framework="expo-react-native"
        continue-on-error: true

      - name: 📊 Generate Excel reports
        run: |
          python3 security/generate_findings_excel.py \
            --semgrep=security/reports/semgrep-results.json \
            --gitleaks=security/reports/gitleaks-results.json \
            --npm-audit=security/reports/npm-audit.json \
            --trivy=security/reports/trivy-results.json \
            --findings-output="Vulnerability Test Results/findings.xlsx" \
            --endpoints-output="Vulnerability Test Results/endpoint-inventory.xlsx"
        continue-on-error: true

      - name: 📤 Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: Vulnerability Test Results/
          retention-days: 30
          if-no-files-found: warn

      - name: 📊 Publish Security Summary
        if: always()
        run: |
          REVIEW_FILE="Vulnerability Test Results/security-review.md"

          CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0; SCORE=0

          if [ -f "$REVIEW_FILE" ]; then
            CRITICAL=$(grep -c "| Critical |" "$REVIEW_FILE" 2>/dev/null || echo 0)
            HIGH=$(grep -c "| High |" "$REVIEW_FILE" 2>/dev/null || echo 0)
            MEDIUM=$(grep -c "| Medium |" "$REVIEW_FILE" 2>/dev/null || echo 0)
            LOW=$(grep -c "| Low |" "$REVIEW_FILE" 2>/dev/null || echo 0)
          fi

          # Check npm audit for dependency vulns
          if [ -f "security/reports/npm-audit.json" ]; then
            NPM_CRITICAL=$(python3 -c "import json; d=json.load(open('security/reports/npm-audit.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo 0)
            NPM_HIGH=$(python3 -c "import json; d=json.load(open('security/reports/npm-audit.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo 0)
            CRITICAL=$((CRITICAL + NPM_CRITICAL))
            HIGH=$((HIGH + NPM_HIGH))
          fi

          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))
          SCORE=$((100 - CRITICAL * 15 - HIGH * 8 - MEDIUM * 3 - LOW * 1))
          [ $SCORE -lt 0 ] && SCORE=0

          STATUS="✅ PASSED"
          [ "$CRITICAL" -gt "0" ] && STATUS="🚨 CRITICAL ISSUES FOUND"
          [ "$HIGH" -gt "0" ] && [ "$CRITICAL" -eq "0" ] && STATUS="⚠️ HIGH ISSUES FOUND"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔐 Security Review Summary — $STATUS

          > Build #${{ github.run_number }} | Branch: \`${{ github.ref_name }}\`

          ## 📊 Findings Overview
          | Severity | Count |
          |----------|-------|
          | 🚨 Critical | $CRITICAL |
          | 🔴 High | $HIGH |
          | 🟡 Medium | $MEDIUM |
          | 🟢 Low | $LOW |
          | **Total** | $TOTAL |

          ## 🎯 Security Score: $SCORE / 100

          ## 🔍 Scans Performed
          - ✅ Semgrep SAST (JavaScript/React/OWASP)
          - ✅ Gitleaks Secret Detection
          - ✅ npm audit Dependency Scan
          - ✅ Trivy Filesystem Scan

          ## 📎 Reports Available
          - 📄 security-review.md
          - 📊 findings.xlsx
          - 📊 endpoint-inventory.xlsx
          EOF

      - name: 🚨 Fail on Critical vulnerabilities
        run: |
          if [ -f "security/reports/npm-audit.json" ]; then
            CRITICAL=$(python3 -c "
          import json
          try:
              d = json.load(open('security/reports/npm-audit.json'))
              print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))
          except: print(0)
          " 2>/dev/null || echo 0)
            if [ "$CRITICAL" -gt "0" ]; then
              echo "🚨 CRITICAL vulnerabilities found in dependencies: $CRITICAL"
              echo "Review the security reports and remediate before merging."
              exit 1
            fi
          fi
          echo "✅ No critical vulnerabilities found in automated scans"
