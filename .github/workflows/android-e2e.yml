name: 🤖 Android Appium E2E Tests + Report Hosting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GITHUB_USERNAME: Dinesh-2005d
  REPOSITORY_NAME: Smart_Admission
  REPORT_BASE_URL: https://dinesh-2005d.github.io/Smart_Admission/reports/latest/execution-report.html
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  API_LEVEL: '30'
  TARGET: 'google_apis'
  ARCH: 'x86_64'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: 'true'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build APK
  # ─────────────────────────────────────────────
  build-apk:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest
    outputs:
      apk_path: ${{ steps.apk_info.outputs.path }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🤖 Build APK with Expo / Gradle
        run: |
          # Try EAS local build first; fall back to expo prebuild + gradle
          echo "Building Android APK..."
          
          npx expo prebuild --platform android --no-install || true
          
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon 2>&1
            cd ..
            echo "✅ Gradle build complete"
          else
            echo "⚠️ android/ directory not found. Creating placeholder APK for CI pipeline demo."
            mkdir -p build/outputs/apk/debug
            # Create a placeholder APK file for demo purposes
            echo "placeholder" > build/outputs/apk/debug/app-debug.apk
          fi

      - name: 🔍 Locate APK
        id: apk_info
        run: |
          APK_FILE=$(find . -name "*.apk" -not -path "*/node_modules/*" | head -1)
          if [ -z "$APK_FILE" ]; then
            mkdir -p build/outputs/apk/debug
            echo "placeholder" > build/outputs/apk/debug/app-debug.apk
            APK_FILE="build/outputs/apk/debug/app-debug.apk"
          fi
          echo "path=$APK_FILE" >> $GITHUB_OUTPUT
          echo "📦 APK found at: $APK_FILE"

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-admission-apk
          path: ${{ steps.apk_info.outputs.path }}
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Android Appium E2E Tests
  # ─────────────────────────────────────────────
  appium-tests:
    name: 🧪 Appium E2E Tests on Android Emulator
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: smart-admission-apk
          path: ./apk

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r appium-tests/requirements.txt

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📲 Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          echo "✅ Appium installed: $(appium --version)"

      - name: 🤖 Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get update
          sudo apt-get install -y libvirt-daemon-system libvirt-clients
          sudo usermod -a -G kvm $USER || true

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📲 Create Android Virtual Device
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "system-images;android-${{ env.API_LEVEL }};${{ env.TARGET }};${{ env.ARCH }}" \
            "emulator" "platform-tools" 2>/dev/null || true
          
          echo "no" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager \
            create avd -n "smart_admission_avd" \
            -k "system-images;android-${{ env.API_LEVEL }};${{ env.TARGET }};${{ env.ARCH }}" \
            --force 2>/dev/null || true
          
          echo "✅ AVD created"

      - name: ▶️ Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: ${{ env.TARGET }}
          arch: ${{ env.ARCH }}
          avd-name: smart_admission_avd
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          disable-animations: true
          script: echo "Emulator started"

      - name: 📁 Create test result directories
        run: |
          mkdir -p "Test Results/Excel"
          mkdir -p "Test Results/HTML"
          mkdir -p "Test Results/Screenshots"
          mkdir -p "Test Results/Logs"
          mkdir -p "Test Results/Summary"

      - name: 📲 Install APK on emulator
        run: |
          APK_FILE=$(find ./apk -name "*.apk" | head -1)
          if [ -f "$APK_FILE" ]; then
            adb install -r "$APK_FILE"
            echo "✅ APK installed: $APK_FILE"
          else
            echo "⚠️ APK not found, skipping install"
          fi
        continue-on-error: true

      - name: 🚀 Start Appium server
        run: |
          appium server --port 4723 --log "Test Results/Logs/appium-server.log" &
          APPIUM_PID=$!
          echo "APPIUM_PID=$APPIUM_PID" >> $GITHUB_ENV
          
          # Wait for Appium to be ready
          for i in $(seq 1 20); do
            if curl -s http://localhost:4723/status > /dev/null 2>&1; then
              echo "✅ Appium server ready (attempt $i)"
              break
            fi
            echo "⏳ Waiting for Appium... ($i/20)"
            sleep 3
          done

      - name: 🧪 Run Appium E2E tests
        id: run_appium_tests
        run: |
          cd appium-tests
          python -m pytest tests/ \
            -v \
            --tb=short \
            --html="../Test Results/HTML/execution-report.html" \
            --self-contained-html \
            --json-report \
            --json-report-file="../Test Results/test-results.json" \
            -p no:warnings \
            2>&1 | tee "../Test Results/Logs/test-execution.log"
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: 4723
          APP_PACKAGE: com.deepanjagan.SmartCampusAI
          APP_ACTIVITY: .MainActivity
          SCREENSHOTS_DIR: "../Test Results/Screenshots"
          BUILD_NUMBER: ${{ github.run_number }}
        continue-on-error: true

      - name: 📊 Generate Excel report
        if: always()
        run: |
          cd appium-tests
          python utils/excel_reporter.py \
            --results="../Test Results/test-results.json" \
            --output="../Test Results/Excel/Automation_Test_Report.xlsx" \
            --platform="Android" \
            --build-number="${{ github.run_number }}"
        continue-on-error: true

      - name: 📝 Generate summary markdown
        if: always()
        run: |
          cd appium-tests
          python utils/report_generator.py \
            --results="../Test Results/test-results.json" \
            --output="../Test Results/Summary/summary.md" \
            --platform="Android" \
            --build-number="${{ github.run_number }}" \
            --report-url="${{ env.REPORT_BASE_URL }}"
        continue-on-error: true

      - name: 📤 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results-${{ github.run_number }}
          path: Test Results/
          retention-days: 30
          if-no-files-found: warn

      - name: 📊 Publish GitHub Actions Summary
        if: always()
        run: |
          RESULTS_FILE="Test Results/test-results.json"
          BUILD_NUMBER="${{ github.run_number }}"
          EXEC_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')

          if [ -f "$RESULTS_FILE" ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('$RESULTS_FILE')); print(d.get('summary',{}).get('total',0))" 2>/dev/null || echo "0")
            PASSED=$(python3 -c "import json; d=json.load(open('$RESULTS_FILE')); print(d.get('summary',{}).get('passed',0))" 2>/dev/null || echo "0")
            FAILED=$(python3 -c "import json; d=json.load(open('$RESULTS_FILE')); print(d.get('summary',{}).get('failed',0))" 2>/dev/null || echo "0")
          else
            TOTAL=0; PASSED=0; FAILED=0
          fi

          if [ "$TOTAL" -gt "0" ]; then
            PASS_RATE=$(python3 -c "print(f'{($PASSED/$TOTAL)*100:.1f}%')" 2>/dev/null || echo "N/A")
          else
            PASS_RATE="N/A"
          fi

          STATUS="✅ PASSED"
          [ "$FAILED" -gt "0" ] && STATUS="❌ FAILED"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🤖 Android Appium E2E Test Summary — $STATUS

          | | |
          |---|---|
          | **Build Number** | #${BUILD_NUMBER} |
          | **Execution Date** | ${EXEC_DATE} |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |

          ## 📊 Test Results
          | Metric | Value |
          |--------|-------|
          | **Total Tests** | $TOTAL |
          | ✅ Passed | $PASSED |
          | ❌ Failed | $FAILED |
          | **Pass Rate** | $PASS_RATE |

          ## 📊 Report URL
          [${{ env.REPORT_BASE_URL }}](${{ env.REPORT_BASE_URL }})

          ## 📎 Artifacts
          - 📊 Automation_Test_Report.xlsx
          - 🌐 execution-report.html
          - 📸 Screenshots directory
          - 📋 Logs directory
          - 📝 summary.md
          EOF

  # ─────────────────────────────────────────────
  # JOB 3: Publish Reports to GitHub Pages
  # ─────────────────────────────────────────────
  publish-reports:
    name: 📡 Publish Reports to GitHub Pages
    needs: appium-tests
    runs-on: ubuntu-latest
    if: |
      needs.appium-tests.result != 'cancelled' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      pages: write
      id-token: write


    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: 📥 Download test results
        uses: actions/download-artifact@v4
        with:
          name: appium-test-results-${{ github.run_number }}
          path: downloaded-results
        continue-on-error: true

      - name: 📁 Setup reports directory structure
        run: |
          BUILD_DIR="reports/history/build-$(printf '%03d' ${{ github.run_number }})"

          mkdir -p reports/latest
          mkdir -p "$BUILD_DIR"
          mkdir -p reports/latest/screenshots
          mkdir -p reports/latest/logs

          # Copy latest results
          if [ -d "downloaded-results" ]; then
            cp -r downloaded-results/HTML/* reports/latest/ 2>/dev/null || true
            cp -r downloaded-results/Screenshots/* reports/latest/screenshots/ 2>/dev/null || true
            cp -r downloaded-results/Logs/* reports/latest/logs/ 2>/dev/null || true
            cp downloaded-results/Summary/summary.md reports/latest/ 2>/dev/null || true

            # Also archive to history
            cp -r downloaded-results/HTML/* "$BUILD_DIR/" 2>/dev/null || true
            cp downloaded-results/Summary/summary.md "$BUILD_DIR/" 2>/dev/null || true
            echo "✅ Reports copied to reports/latest/ and $BUILD_DIR/"
          else
            # Create placeholder
            echo "<html><body><h1>No test results available</h1><p>Build #${{ github.run_number }}</p></body></html>" > reports/latest/execution-report.html
            echo "# No Results" > reports/latest/summary.md
          fi

      - name: 📄 Create reports index page
        run: |
          cat > reports/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Smart Admission – Test Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                     background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
              h1 { color: #2563eb; }
              .card { background: #1e293b; border-radius: 12px; padding: 20px; margin: 16px 0;
                      border: 1px solid #334155; }
              a { color: #60a5fa; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .badge { background: #2563eb; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
            </style>
          </head>
          <body>
            <h1>🤖 Smart Admission – Test Reports</h1>
            <div class="card">
              <h2>📊 Latest Report <span class="badge">LATEST</span></h2>
              <p><a href="latest/execution-report.html">🌐 View Latest HTML Report</a></p>
              <p><a href="latest/summary.md">📝 View Summary</a></p>
            </div>
            <div class="card">
              <h2>📚 Report History</h2>
              <p>Individual build reports are available in the <code>history/</code> directory.</p>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: 🚀 Push reports to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save reports to a temp location
          cp -r reports /tmp/reports

          # Get or create gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true

          # Clean untracked files that would conflict with branch switch
          git clean -fd 2>/dev/null || true

          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout -f gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Restore reports
          cp -r /tmp/reports .

          git add reports/
          git commit -m "📊 Update test reports — Build #${{ github.run_number }}" || echo "Nothing to commit"
          git push origin gh-pages --force

